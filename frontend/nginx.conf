server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Permite subir videos/archivos grandes (el backend recibe multipart)
    client_max_body_size 2g;

    # Compresión para los assets de Angular
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # --- API: proxy al backend Spring Boot (red interna educativa_net) ---
    location /api/ {
        proxy_pass http://educativa-backend:8080/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        # Streaming de subidas/descargas (videos) sin bufferizar en disco
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
    }

    # --- Swagger / OpenAPI del backend (útil para pruebas) ---
    location /v3/api-docs {
        proxy_pass http://educativa-backend:8080;
        proxy_set_header Host $host;
    }
    location /swagger-ui {
        proxy_pass http://educativa-backend:8080;
        proxy_set_header Host $host;
    }

    # --- SPA Angular: cualquier ruta cae en index.html (history mode) ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
